[package]
name    = "hello-world"
version = "0.1.0"
edition = "2021"

[dependencies]
# We only need the HAL and the support crates
esp-hal = { git = "https://github.com/esp-rs/esp-hal", branch = "main", features = ["esp32s3"] }
esp-backtrace = { git = "https://github.com/esp-rs/esp-hal", branch = "main", features = ["esp32s3", "panic-handler", "println"] }
esp-println = { git = "https://github.com/esp-rs/esp-hal", branch = "main", features = ["esp32s3"] }

[profile.release]
lto           = "fat"
codegen-units = 1
opt-level     = "s"
debug         = true

[unstable]
build-std = ["core"]
